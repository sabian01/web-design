<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSpace</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        p{
        font-family: Inter;
        margin: 0;
       }
  
      .cover-container, .info-container{ 
    
      }

      .profile-container{
        vertical-align: top;
        width: 45px;
      }

      .profile-container, .stats-container {
        display: inline-block;
      }

      .profile-pic{ 
        width: 45px;
        height: 45px;
        border-radius: 50%;
      }


      .stats-container{ 
        width: 245px;
        margin-left: 5px;
      }

      .video-template{ 
        display: inline-block;
        width: 300px;
        margin-left: 40px;
        vertical-align: top;
      }

      .cover {
        width: 300px;
      }
    
    
    
      .title{ 
        font-weight:500;
        margin-bottom: 7px;
      }
  
      .author, .stats {
        color: grey;
        font-size: 14px;
        margin-bottom: 5px;
      }
    
    
      .search-box {
        margin-bottom: 20px;
        display: block;
      }
    </style>

    
</head>
<body>


  
  <input type="text" placeholder="Search"
  class="search-box">

  <div class="video-template">

    <!--Shtrese vertikale-->
    <div class="cover-container">
      <img src="covers/cover01.webp" class="cover">
    </div>
   


    <!--Shtrese vertikale-->
    <div class="info-container">

      <!--Shtrese horizontale-->
      <div class="profile-container">
        <img src="profiles/profile01.jpg" class="profile-pic">
      </div>

      <div class="stats-container">
      
      <p class="title">Playstation 5 Unboxing & Accessories</p>
    
      <p class="author">
        Marques Brownlee
      </p>
    
      <p class="stats">
        14M viewers · 3 years ago
      </p>
      </div>


    </div>
  </div><!--Video template end-->

 


  
  <div class="video-template">

    <!--Shtrese vertikale-->
    <div class="cover-container">
      <img src="covers/cover02.webp" class="cover">
    </div>
   
    <!--Shtrese vertikale-->
    <div class="info-container">

      <!--Shtrese horizontale-->
      <div class="profile-container">
        <img src="profiles/profile02.jpg" class="profile-pic">
      </div>

      <div class="stats-container">
      
      <p class="title">I Built 100 Wells In Africa</p>
    
      <p class="author">
        MrBeast
      </p>
    
      <p class="stats">
        105M viewers · 11 days ago
      </p>
      </div>


    </div>
  </div><!--Video template end-->


    
</body>
</html>
