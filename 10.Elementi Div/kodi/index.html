<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube</title> 

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    p{
        font-family: Roboto, Arial;
        margin-top: 0;
        margin-bottom: 0;
    }

    .mbajtesi-kopertines { 
      margin-bottom: 10px;
    }


    .kopertina {
      width: 300px;
      display: block;
      border-radius: 7px;
      cursor: pointer;
    }

    .kerkuesi {
      display: block;
      margin-left: 12px;
      margin-bottom: 20px;
    }

    .video-template {
      display: inline-block;
      margin-right: 20px;
      vertical-align: top;
      width: 300px;
    }

    .mbajtesi-foto-profili {
      display: inline-block;
      width: 50px;
      vertical-align: top;
    }

    .foto-profili { 
      width: 40px;
      border-radius: 50%;
      cursor: pointer;
    }

    .mbajtesi-informacionit { 
      display: inline-block;
      width: 240px;
   
    }

    .titulli {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .autori {
      color: rgb(93, 93, 93);
      font-size: 16px;
      margin-bottom: 5px;
    }

    .statistikat { 
      color: rgb(93, 93, 93);
      font-size: 16px;
    }



  
  </style>
</head>
<body>



  <input class="kerkuesi"  type="text"
   placeholder="Search...">


   <div class="video-template">
    <!--Shtresa vertikale-->
    <div class="mbajtesi-kopertines">
      <img class="kopertina" 
      src="asete/kopertina/kopertina01.webp">
    </div>

    <!--Shtresa vertikale-->
    <div>
      <!--Shtrese horizontale-->
      <div class="mbajtesi-foto-profili">
        <img class="foto-profili"
        src="asete/foto-profili/foto-profili01.jpg">
      </div>


      <!--Shtrese horizontale-->
      <div class="mbajtesi-informacionit">
        <p class="titulli">
          Dhurata Dora - PA MU (Official Video)
        </p>
      
        <p class="autori">
          Dhurata Dora &#9834;
        </p>
      
        <p class="statistikat">
          27M viewers &#183; 3 months ago
      </p>
      </div>
    </div>

   </div>



   
   <div class="video-template">
    <!--Shtresa vertikale-->
    <div class="mbajtesi-kopertines">
      <img class="kopertina"
       src="asete/kopertina/kopertina02.webp">
    </div>

    <!--Shtresa vertikale-->
    <div>
      <!--Shtrese horizontale-->
      <div class="mbajtesi-foto-profili">
        <img class="foto-profili"
        src="asete/foto-profili/foto-profili02.jpg">
      </div>


      <!--Shtrese horizontale-->
      <div class="mbajtesi-informacionit">
        <p class="titulli">
          I Built 100 Wells In Africa
        </p>
      
        <p class="autori">
          MrBeast &#10003;
        </p>
      
        <p class="statistikat">
          105M viewers &#183; 11 days ago
        </p>
      </div>
    </div>

   </div>

</body>
</html>
