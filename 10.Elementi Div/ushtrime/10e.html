<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9g</title>

    <style>

        p{ 
            font-family: Arial, Helvetica, sans-serif;
            padding-left: 10px;
            padding-right: 10px;
        }

        .container{ 
            width: 200px;
            display: inline-block;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.5);
            margin-left: 30px;
            margin-top: 100px;
        }
        
        .photo{ 
            width: 100%;
            height: 190px;
            object-fit: cover;
        }

        .name{ 
            font-weight: bold;
            font-size: 18px;
        }

        .stats {
            color: gray;
        }
        

        .follow-button {
            background-color: rgb(5, 130, 255);
            color: white;
            border: none;
            border-radius: 2px;
            padding: 10px 20px;
            margin-left: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }





    </style>
</head>
<body>

    <!--Template-->
    <div class="container">
        <img src="asete/duffy.webp" class="photo">
        <p class="name">
            Duffy
        </p>
        <p class="stats">
            2 mutual friends
        </p>

        <button class="follow-button">
            Follow
        </button>
    </div>

    <!--Template-->
    <div class="container">
        <img src="asete/bugsBunny.jpg" class="photo">
        <p class="name">
            Bugs Bunny
        </p>
        <p class="stats">
            14 mutual friends
        </p>

        <button class="follow-button">
            Follow
        </button>
    </div>


    
    <!--Template-->
    <div class="container">
        <img src="asete/rick.webp" class="photo">
        <p class="name">
            Rick
        </p>
        <p class="stats">
            7 mutual friends
        </p>

        <button class="follow-button">
            Follow
        </button>
    </div>
    
</body>
</html>
