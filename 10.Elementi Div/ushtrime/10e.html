<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10e</title>
    <style>
        p {
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0;
            margin-bottom: 0;
        }

    
        .mbajtesi {
            width: 400px;
            height: 100px;
            margin-bottom: 10px;
        }

        .mbajtesi-fotos {
            display: inline-block;
            height: 100px;
            vertical-align: middle;
        }


        .foto-profili {
           width: 80px;
           height: 80px;
           border-radius: 50%;
           vertical-align: middle;
           object-fit: cover;
           object-position: center;
           margin-top: 10px;
        }

        .mbajtesi-info { 
            display: inline-block;
            vertical-align: middle;

            height: 100px;
            width: 180px;

            margin-left: 20px;
        }
        
        .emri { 
            font-weight: bold;
            margin-top: 18px;
            margin-bottom: 4px;
        }

        .pseudonimi,
        .pershkrim
         {
            color: rgb(98, 98, 98);
            margin-bottom: 4px;
        }

        .mbajtesi-butonit {
            display: inline-block;
            vertical-align: middle;
            height: 100px;
            width: 100px;
        }


        .butoni-follow { 
            background-color: rgb(0, 136, 255);
            color: white;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 20px;
            padding-right: 20px;
            
            margin-left: 10px;
            margin-top: 27px;

            font-size: 16px;
            font-weight: bold;

            border-radius: 5px;

            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="mbajtesi">

        <!--Shtrese horizontale-->
        <div class="mbajtesi-fotos">
            <img class="foto-profili"
             src="foto/foto-profili01.webp">
        </div>
        
        <!--Shtrese horizontale-->
        <div class="mbajtesi-info">
            <p class="emri">Dufy</p>
            <p class="pseudonimi">The Duck</p>
            <p class="pershkrim">Popular</p>
        </div>

        <!--Shtrese horizontale-->
        <div class="mbajtesi-butonit">
            <button class="butoni-follow">
                Follow
            </button>
        </div>
    </div>


    <div class="mbajtesi">

        <!--Shtrese horizontale-->
        <div class="mbajtesi-fotos">
            <img class="foto-profili"
             src="foto/foto-profili02.jpg">
        </div>
        
        <!--Shtrese horizontale-->
        <div class="mbajtesi-info">
            <p class="emri">NoMoney</p>
            <p class="pseudonimi">Rosaku</p>
            <p class="pershkrim">Popular</p>
        </div>

        <!--Shtrese horizontale-->
        <div class="mbajtesi-butonit">
            <button class="butoni-follow">
                Follow
            </button>
        </div>
    </div>

    <div class="mbajtesi">

        <!--Shtrese horizontale-->
        <div class="mbajtesi-fotos">
            <img class="foto-profili"
             src="foto/foto-profili03.jpg">
        </div>
        
        <!--Shtrese horizontale-->
        <div class="mbajtesi-info">
            <p class="emri">Bux Bunny</p>
            <p class="pseudonimi">Lepuri</p>
            <p class="pershkrim">Popular</p>
        </div>

        <!--Shtrese horizontale-->
        <div class="mbajtesi-butonit">
            <button class="butoni-follow">
                Follow
            </button>
        </div>
    </div>




</body>
</html>
