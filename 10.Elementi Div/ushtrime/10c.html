<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10c</title>

    <style>
        p { 
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 0;
            margin-bottom: 0;
        }

        .mbajtesi { 
            background-color: darkblue;
            width: 360px;
            padding-left: 12px;
            padding-top: 20px;
            padding-right: 12px;
            padding-bottom: 20px;
        }

        .titulli{ 
            font-size: 20px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            
        }

        .nentitulli {
            color: lightcoral;
        }




    </style>
</head>
<body>
    

    <div class="mbajtesi"> 
        <p class="titulli">Sistemi i Operimit</p>
        <p class="nentitulli">
            Sistemi i operimit është softueri bazë 
            i një kompjuteri që lejon aplikacionet të
             funksionojnë ne kompjuter.
        </p>
    </div>
</body>
</html>
