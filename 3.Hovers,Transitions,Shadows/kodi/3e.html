<style>
  .apply-button {
    background-color: rgb(10, 102, 194);
    color: white;
    border: none;
    border-radius: 25px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 600;
    font-size: 12px;
    width: 200px;
    height: 28px;
    cursor: pointer;
    margin-right: 10px;

    transition: background-color 0.2s;
  }

  .apply-button:hover {
    background-color: rgb(15, 75, 134);
  }

  .save-button { 
    background-color: transparent;
    color: rgb(10, 102, 194);
    border-width: 1px;
    border-style: solid;
    border-color: rgb(10, 102, 194);
    border-radius: 25px;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 600;
    font-size: 12px;
    width: 80px;
    height: 28px;
    cursor: pointer;

    transition: background-color 0.2s,
    border-width 0.2s;
  }

  .save-button:hover {
    background-color: rgba(10, 102, 194, 0.2);
    border-width: 2px;
  }
</style>

<button class="apply-button">
  Apply on company website
</button>

<button class="save-button">
  Save
</button>
