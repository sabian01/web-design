<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        .apply-button {
          background-color: rgb(10, 102, 194);
          color: white;
          border: none;
          height: 40px;
          width: 240px;
          font-weight: bold;
          font-size: 15px;
          border-radius: 20px;
          cursor: pointer;
          margin-right: 8px;
          transition: background-color 0.14s;
        }

        .apply-button:hover{
            background-color: rgb(12, 86, 161);
        }
      
        .save-button {
          background-color: white;
          color: rgb(10, 102, 194);
          border-width: 1px;
          border-style: solid;
          border-color: rgb(10, 102, 194);
          height: 40px;
          width: 80px;
          font-weight: bold;
          font-size: 15px;
          border-radius: 20px;
          cursor: pointer;
         transition: background-color 0.1s,
         border-width 0.02s;
        }

        .save-button:hover{
            background-color: rgba(10, 102, 194, 0.2);
            border-width: 2px;
        }

      </style>
</head>
<body>
    
      
      <button class="apply-button">
        Apply on company website
      </button>
      
      <button class="save-button">
        Save
      </button>
</body>
</html>
