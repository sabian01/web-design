<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3c</title>

    <style>
        .github-button{
            background-color: rgb(46, 164, 69);
            color: white;
            border: none;
            border-radius: 4px;
            height: 28px;
            width: 80px;
            cursor: pointer;
            font-weight: bold;
            transition: box-shadow 0.14s;
            
        }


        .github-button:hover{
            box-shadow: 0px 10px 15px rgba(0, 0, 0, 0.1);
        }


    </style>
</head>
<body>

    <button class="github-button">Sign up</button>
    
</body>
</html>
