<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .uber-button{
            background-color: black;
            color: white;
            border: none;
            height:30px;
            width: 100px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.18s;
        }
    

        .uber-button:hover{
            opacity: 0.75;
        }
      </style>
</head>
<body>
    
      
      <button class="uber-button">
        Request now
      </button>
</body>
</html>
