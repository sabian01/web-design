<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .grid { 
      display: grid;
      grid-template-columns: 200px 100px;
    }

    .kolona1 { 
      background-color: lightgreen;
    }

    .kolona2 { 
      background-color: lightcoral;
    }
  </style>
</head>
<body>

  <div class="grid">
    <div class="kolona1">200px</div>
    <div class="kolona2">100px</div>
  </div>
  
</body>
</html>
