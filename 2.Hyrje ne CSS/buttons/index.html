<style>

  .subscribe-button{
    background-color: rgb(201, 21, 21);
    color: white;
    border: none;
    border-radius: 3px;
    width: 100px;
    height: 30px;
    font-size: 12px;
    cursor: pointer;

    margin-right: 10px;
  }


  .join-button{
    background-color: white;
    border-color: rgb(74, 179, 197);
    color: rgb(74, 179, 197);
    border-style: solid;
    border-width: 1px;
    height: 30px;
    width: 60px;
    border-radius: 3px;
    cursor: pointer;
  }


  .tweet-button{
    background-color: rgb(91, 186, 250);
    color: white;
    border: none;
    border-radius: 20px;
    height: 30px;
    width: 60px;
    margin-left: 10px;
    cursor: pointer;
    font-weight: bold;
  }



</style>

<button class="subscribe-button">SUBSCRIBE</button>
<button class="join-button">JOIN</button>
<button class="tweet-button">Tweet</button>
