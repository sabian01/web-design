<style>
  .login-button{
    background-color: green;
    color: white;
    height: 30px;
    width: 75px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-right: 10px;
  }


  .login-button:hover{
    opacity: 0.8;
  }

  .login-button:active{
    opacity: 0.5;
  }


  .download-button{
    background-color: white;
    color: rgb(30, 94, 184);
    border-color: rgb(30, 94, 184);
    border-style: solid;
    border-width: 1px;
    height: 30px;
    width: 90px;
   border-radius: 4px;
   cursor: pointer;
   transition: background-color 0.2s,
   color 0.2s;
   margin-right: 10px;
  }

  .download-button:hover{
    background-color: rgb(30, 94, 184);
    color: white;
  }

  .download-button:active{
    opacity: 0.8;
  }


  .shadow-button{
    background-color: rgb(38, 144, 196);
    color: white;
    height: 30px;
    width: 90px;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: box-shadow 0.4s,
    background-color 0.2s;
    
  }

  .shadow-button:hover{
    box-shadow: 0px 4px 10px rgba(0, 0, 0,0.8 );
  }


  .shadow-button:active{
    background-color: rgb(22, 94, 131);
  }

</style>


<button class="login-button">Log in</button>
<button class="download-button">Download</button>
<button class="shadow-button">Shadow</button>
