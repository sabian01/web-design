<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10f</title>

  <style>



    p{ 
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      display: inline-block;
      margin-top: 30px;
      margin-left: 30px;
    }

    .cover-img {
      height: 150px;
      border-radius: 7px;
    }


    .img-container {
      display: inline-block;
     vertical-align: top;
     margin-right: 10px;
    }

    .info-container {
      display: inline-block;
      height: 150px;
      width: 330px;
    }

    .profile-img {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      vertical-align: middle;
    }

    .autori {
      display: inline-block;
    }

    .title{ 
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .statistika, .autori {
      color: gray;
      margin-bottom: 10px;
    }



  </style>
</head>
<body>


  <div class="container">

    <!--Horizontal-->
    <div class="img-container">
      <img src="asete/cover.avif" class="cover-img">
    </div>

    <!--Horizontal-->
    <div class="info-container">
      <p class="title">Week In The Life of a Young Millionaire In USA</p>
      <p class="statistika">424K views  3 weeks ago</p>
      <div class="profile-container">
        <img class="profile-img" src="asete/channels4_profile.jpg">
        <p class="autori">Iman Gadzhi</p>
      </div>
    
    </div>

  </div>
  
  
</body>
</html>
