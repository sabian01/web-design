<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid</title>
</head>
<body>

  <div style="
  display: grid;
  grid-template-columns: 100px 200px;
  margin-bottom: 20px;">

    <div style="
    background-color: lightgreen;">
      100px
    </div>
    <div style="
    background-color: lightblue;"
    >200px</div>
 
  </div>

  

  <div style="display: grid;
  grid-template-columns: 100px 1fr; 
  margin-bottom: 20px;">
    <div style="
    background-color: lightgreen;">
      100px
    </div>
    <div style="
    background-color: lightblue;"
    >1fr</div>
  </div>


  
  <div style="
  display: grid;
  grid-template-columns: 1fr 2fr;
  margin-bottom: 100px; 
  ">
    <div style="
    background-color: lightgreen;">
      1fr
    </div>
    <div style="
    background-color: lightblue;"
    >1fr</div>
  </div>


  <div style="
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  column-gap: 30px;
  row-gap: 30px;
  margin-bottom: 20px; 
  ">
    <div style="
    background-color: lightgreen;
    height: 170px;">
      1fr
    </div>

    <div style="
    background-color: lightblue;
    height: 170px;"
    >1fr</div>

    <div style="
    background-color: lightgreen;
    height: 170px;">
      1fr
    </div>


    <div style="
    background-color: lightblue;
    height: 170px;">
      1fr
    </div>
    
    <div style="
    background-color: lightgreen;
    height: 170px;"
    >1fr</div>

    <div style="
    background-color: lightblue;
    height: 170px;">
      1fr
    </div>

  </div>






  
  
</body>
</html>
