<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .navbar{ 
            display: flex;
            justify-content: space-between;

            background-color: rgb(19, 29, 36);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            padding-left: 28px;
            padding-right: 28px;
        }

        .left-side {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .left-side h3 {
            cursor: pointer;
        }


        .right-side {
            display: flex;
            width: 350px;
            justify-content: space-between;
            align-items: center;
        }

        .item, .contact-item {
            cursor: pointer;
            font-weight: bold;
        }

        .item {
            transition: color 0.15s;
        }

        .item:hover {
            color: rgb(0, 191, 255);
        }

        .contact-item {
            background-color: rgb(0, 191, 255);
            padding: 10px 20px;
            border-radius: 30px;
            transition: background-color 0.15s,
            color 0.15s;
        }

        .contact-item:hover{
            background-color: rgb(255, 255, 255);
            color: rgb(0, 191, 255);
        }



    </style>
</head>
<body>


    <div class="navbar">

        <div class="left-side">
            <h3>Navbar</h3>
        </div>

        <div class="right-side">
            <p class="item">Services</p>
            <p class="item">Projects</p>
            <p class="item">About</p>
            <p class="contact-item">Contact</p>
        </div>

    </div>
    
</body>
</html>
