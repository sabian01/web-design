<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <style>


        .navbar{ 
            background-color: rgb(0, 195, 255);
            display: flex;
            height: 67px;
            justify-content: space-between;
            padding-left: 20px;
            padding-right: 20px;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.4);
        }


        .left-side {
    
            color: white;
            display: flex;
            flex: 1;
            align-items: center;

        }


        .navbar-title {
            font-family: Arial, Helvetica, sans-serif;
        }

        .right-side {
          
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 250px;
        }


        .item{ 
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
            cursor: pointer;
        }


        .item:hover {
            color: yellow;
        }

    </style>
</head>
<body>


    <div class="navbar">
        <div class="left-side">
           <h3 class="navbar-title">Navbar</h3>
        </div>

        <div class="right-side">

            <p class="item">Contact</p>
            <p class="item">Setting</p>
            <p class="item">Profile</p>
    
        </div>

    </div>
    
</body>
</html>
